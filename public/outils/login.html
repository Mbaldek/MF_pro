<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Connexion · Catalogue Maison Félicien</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Questrial&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #8B3A43;
    --vieux-rose: #BF646D;
    --poudre: #E5B7B3;
    --vert: #968A42;
    --blanc: #F0F0E6;
    --marron: #392D31;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Questrial', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--blanc);
    color: var(--marron);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: white;
    border: 1px solid var(--poudre);
    border-radius: 6px;
    padding: 48px 40px 40px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 24px 48px rgba(57,45,49,0.08);
  }
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand-maison {
    font-size: 0.68rem;
    letter-spacing: 0.4em;
    color: var(--vert);
    text-transform: uppercase;
  }
  .brand-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 2rem;
    color: var(--rose);
    font-weight: 500;
    margin-top: 6px;
  }
  .brand-sub {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    color: var(--marron);
    opacity: 0.65;
    margin-top: 8px;
    text-transform: uppercase;
  }
  h1 {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.25rem;
    color: var(--marron);
    text-align: center;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .sub {
    text-align: center;
    font-size: 0.82rem;
    color: var(--marron);
    opacity: 0.7;
    margin-bottom: 28px;
  }
  .field {
    margin-bottom: 16px;
  }
  .field-label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--marron);
    margin-bottom: 6px;
    opacity: 0.8;
  }
  .input {
    width: 100%;
    font-family: var(--sans);
    font-size: 0.95rem;
    padding: 11px 14px;
    border: 1px solid var(--poudre);
    border-radius: 4px;
    background: var(--blanc);
    color: var(--marron);
    transition: border-color 0.15s, background 0.15s;
  }
  .input:focus {
    outline: none;
    border-color: var(--rose);
    background: white;
  }
  .btn {
    width: 100%;
    font-family: var(--sans);
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 14px 20px;
    border: none;
    background: var(--rose);
    color: var(--blanc);
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .btn:hover { background: var(--marron); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(191,100,109,0.1);
    border-left: 2px solid var(--vieux-rose);
    color: var(--vieux-rose);
    padding: 10px 12px;
    font-size: 0.8rem;
    border-radius: 3px;
    margin-top: 14px;
    display: none;
  }
  .error.show { display: block; }
  .foot {
    margin-top: 28px;
    text-align: center;
    font-size: 0.72rem;
    color: var(--marron);
    opacity: 0.55;
  }
</style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand-maison">Maison</div>
      <div class="brand-name">Félicien</div>
      <div class="brand-sub">Catalogue · Admin</div>
    </div>

    <h1>Connexion</h1>
    <div class="sub">Accès réservé à l'administrateur.</div>

    <form id="form">
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input type="email" class="input" id="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label class="field-label" for="password">Mot de passe</label>
        <input type="password" class="input" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="btn-submit">Se connecter</button>
      <div class="error" id="error"></div>
    </form>

    <div class="foot">pro.maison-felicien.com · outils internes</div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = 'https://ckvwkwufdlydobjfwvwy.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_HICvkAoFNpeWenSsXT-FFQ_4O0IyS2l';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
  });

  // Si déjà connecté admin, redirection immédiate vers le builder
  (async () => {
    const { data: { session } } = await client.auth.getSession();
    if (session && session.user?.app_metadata?.role === 'admin') {
      window.location.href = '/outils/catalogue-builder';
    }
  })();

  const form = document.getElementById('form');
  const errEl = document.getElementById('error');
  const btn = document.getElementById('btn-submit');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
  }
  function hideError() { errEl.classList.remove('show'); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    btn.disabled = true;
    btn.textContent = 'Connexion…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      showError(error.message || 'Identifiants incorrects.');
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }

    if (data.user?.app_metadata?.role !== 'admin') {
      await client.auth.signOut();
      showError("Ce compte n'a pas les droits administrateur.");
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }

    window.location.href = '/outils/catalogue-builder';
  });
</script>
</body>
</html>
